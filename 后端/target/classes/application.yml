server:
  port: 8080

spring:
  application:
    name: qqweb-backend

  # H2 数据库（开发环境，MySQL 兼容模式）
  datasource:
    url: jdbc:h2:file:./data/qqweb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 控制台（开发时可访问 http://localhost:8080/h2-console）
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update  # 自动建表
    show-sql: false

  # 文件上传大小限制
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # Jackson JSON 配置
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null

# JWT 配置
jwt:
  secret: qqweb-chat-secret-key-2024-this-is-a-very-long-secret-for-hs256
  expiration: 86400000  # 24小时 = 86400000ms

# 文件上传路径
file:
  upload:
    path: ./uploads/images
    url-prefix: /uploads/images

# 日志
logging:
  level:
    com.qqweb: DEBUG
    org.springframework.web.socket: DEBUG
